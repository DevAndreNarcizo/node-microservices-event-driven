services:
  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    environment:
      PORT: 3001
      MONGO_URL: mongodb://${MONGO_ORDER_USER:-order-admin}:${MONGO_ORDER_PASSWORD:-orderSecret123}@order-mongo:27017/orders?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-app_user}:${RABBITMQ_PASSWORD:-appPass456}@rabbitmq:5672
    depends_on:
      - order-mongo
      - rabbitmq
    ports:
      - "3001:3001"

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    environment:
      PORT: 3002
      MONGO_URL: mongodb://${MONGO_NOTIFICATION_USER:-notification-admin}:${MONGO_NOTIFICATION_PASSWORD:-notifSecret789}@notification-mongo:27017/notifications?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-app_user}:${RABBITMQ_PASSWORD:-appPass456}@rabbitmq:5672
    depends_on:
      - notification-mongo
      - rabbitmq
    ports:
      - "3002:3002"

  order-mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ORDER_USER:-order-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ORDER_PASSWORD:-orderSecret123}
    ports:
      - "27018:27017"

  notification-mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_NOTIFICATION_USER:-notification-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_NOTIFICATION_PASSWORD:-notifSecret789}
    ports:
      - "27019:27017"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-app_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-appPass456}
    ports:
      - "5674:5672"
      - "15674:15672"

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
